<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIT Admin – Verify 2FA</title>
  <script>(function(){var k="sit_theme",t;try{t=localStorage.getItem(k)}catch(e){t=null}if(t!=="light"&&t!=="dark"){try{t=window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"}catch(e){t="light"}}document.documentElement.setAttribute("data-theme",t||"light");})();</script>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="login-wrapper">
    <button class="login-theme-btn" onclick="window.toggleTheme&&window.toggleTheme()" id="loginThemeBtn">&#9728; Light</button>
    <div class="login-illust">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" width="160" height="160">
        <circle cx="100" cy="100" r="96" stroke="#374151" stroke-width="2" fill="none" opacity=".25"/>
        <circle cx="100" cy="100" r="70" stroke="#6b7280" stroke-width="1.5" fill="none" opacity=".2"/>
        <path d="M100 40 L140 62 V110 C140 140 100 160 100 160 C100 160 60 140 60 110 V62 Z"
              stroke="#9ca3af" stroke-width="2.5" fill="none"/>
        <polyline points="82,105 95,118 120,88" stroke="#d1d5db" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="30" y1="100" x2="55" y2="100" stroke="#4b5563" stroke-width="1" opacity=".3"/>
        <line x1="145" y1="100" x2="170" y2="100" stroke="#4b5563" stroke-width="1" opacity=".3"/>
        <line x1="100" y1="30" x2="100" y2="5" stroke="#4b5563" stroke-width="1" opacity=".3"/>
        <circle cx="30" cy="100" r="2" fill="#6b7280" opacity=".4"/>
        <circle cx="170" cy="100" r="2" fill="#6b7280" opacity=".4"/>
        <circle cx="100" cy="5" r="2" fill="#6b7280" opacity=".4"/>
      </svg>
      <h2>Scammer Identification<br/>&amp; Validation Tool</h2>
      <p>Enterprise threat detection platform</p>
    </div>

    <div class="login-box">
      <h1>Verify 2FA</h1>
      <p class="subtitle">
        Enter the 6-digit code from your authenticator app <em>or</em> request one via email
      </p>
      <p id="maskedEmailHint" style="display:none;text-align:center;font-size:12px;color:var(--text-2);margin-top:-10px;margin-bottom:16px">
        Email code will be sent to <strong id="maskedEmailText"></strong>
      </p>
      <div id="errorMsg" class="error-msg"></div>

      <form id="twofaForm">
        <div class="form-group">
          <label for="twofaCode">2FA Code</label>
          <input type="text" id="twofaCode" placeholder="000000" maxlength="6" required autocomplete="one-time-code" style="text-align:center;font-size:24px;letter-spacing:8px" />
        </div>
        <button
          type="button"
          id="sendEmailOtpBtn"
          class="btn"
          style="width:100%;margin-top:4px;margin-bottom:6px;background:var(--bg-2);color:var(--text-1);border:1px solid var(--border)"
        >
          Send Email OTP
        </button>
        <div id="otpCooldownHint" style="min-height:16px;font-size:11px;color:var(--text-3);text-align:center;margin-bottom:8px"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Verify</button>
      </form>

      <p style="text-align:center;margin-top:16px"><a href="login.html" style="font-size:12px;color:var(--text-3)">Back to login</a></p>
    </div>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/login-2fa.js"></script>
</body>
</html>
