<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIT Admin – Scans</title>
  <script>(function(){var k="sit_theme",t;try{t=localStorage.getItem(k)}catch(e){t=null}if(t!=="light"&&t!=="dark"){try{t=window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"}catch(e){t="light"}}document.documentElement.setAttribute("data-theme",t||"light");})();</script>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- Top Bar -->
  <div class="topbar">
    <button class="topbar-close" title="Close" onclick="window.close()">&#10005;</button>
    <div class="topbar-search">
      <span class="search-icon">&#128269;</span>
      <input type="text" placeholder="Search... (Ctrl+K)" id="globalSearch" onfocus="document.dispatchEvent(new KeyboardEvent('keydown',{key:'k',ctrlKey:true}))" readonly />
    </div>
    <div class="topbar-right">
      <button class="notif-bell" id="notifBell" onclick="toggleNotifDropdown()">
        &#128276;<span class="notif-badge" id="notifCount" style="display:none">0</span>
      </button>
      <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle theme" type="button">&#9728; <span class="theme-toggle-label">Light</span></button>
      <div class="user-pill" id="userPill">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-pill-info">
          <div class="name" id="userName">Admin</div>
          <div class="email" id="userEmail">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Notification Dropdown -->
  <div class="notif-dropdown" id="notifDropdown">
    <div class="notif-dropdown-header">
      <h3>Notifications</h3>
      <button class="btn btn-sm" onclick="markAllNotifRead()">Mark all read</button>
    </div>
    <div class="notif-dropdown-body" id="notifList"></div>
    <div class="notif-dropdown-footer">
      <button class="btn btn-sm" onclick="toggleNotifDropdown()">Close</button>
    </div>
  </div>

  <div class="layout">
    <nav class="sidebar">
      <div class="brand">ADMIN PANEL</div>
      <div class="brand-sub">Enterprise Dashboard</div>
      <a href="dashboard.html"><span class="nav-icon">&#9632;</span><span>Dashboard</span></a>
      <a href="scans.html" class="active"><span class="nav-icon">&#128269;</span><span>Scans</span></a>
      <a href="profile.html"><span class="nav-icon">&#128101;</span><span>Admin Profile</span></a>
      <a href="reports.html"><span class="nav-icon">&#128196;</span><span>Reports</span></a>
      <a href="analytics.html"><span class="nav-icon">&#128200;</span><span>Analytics</span></a>
      <a href="2fa.html"><span class="nav-icon">&#128274;</span><span>2FA & Security</span></a>
      <a href="settings.html"><span class="nav-icon">&#9881;</span><span>Settings</span></a>
      <div class="spacer"></div>
      <a href="#" class="logout-btn" onclick="logout()"><span class="nav-icon">&#10140;</span><span>Logout</span></a>
    </nav>

    <div class="main">
      <h1>Scans</h1>
      <div id="liveStatus" class="live-status">Last updated: -</div>

      <div class="card">
        <h2>Quick Scan</h2>
        <form id="scanForm">
          <div class="form-group">
            <label for="scanLink">URL to scan</label>
            <input type="text" id="scanLink" placeholder="https://example.com/suspicious-page" required />
          </div>
          <button type="submit" class="btn btn-primary">Scan</button>
        </form>
        <div id="scanResult" class="mt-2" style="display:none"></div>
      </div>

      <div class="card">
        <h2>Scan History</h2>
        <div class="toolbar">
          <input type="text" id="searchInput" placeholder="Search by link..." />
          <select id="verdictFilter">
            <option value="">All</option>
            <option value="safe">Safe</option>
            <option value="suspicious">Suspicious</option>
            <option value="scam">Scam</option>
          </select>
          <span id="pageInfo" class="page-info">&mdash;</span>
        </div>
        <table>
          <thead><tr><th>ID</th><th>Link</th><th>Threat</th><th>Score</th><th>Reason</th><th>Report</th><th>Date</th></tr></thead>
          <tbody id="scansBody"><tr><td colspan="7"><div class="skeleton skeleton-text"></div></td></tr></tbody>
        </table>
        <div class="pagination">
          <button class="btn btn-sm" id="prevBtn" disabled>&laquo; Prev</button>
          <button class="btn btn-sm" id="nextBtn" disabled>Next &raquo;</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scan Evidence Modal -->
  <div class="modal-overlay" id="scanModal" style="display:none" onclick="if(event.target===this)closeModal('scanModal')">
    <div class="modal" style="max-width:700px">
      <div class="modal-header"><h2>Scan Evidence</h2><button class="modal-close" onclick="closeModal('scanModal')">&#10005;</button></div>
      <div class="modal-body" id="scanModalBody"></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('scanModal')">Close</button>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/api.js" onerror="document.body.innerHTML='<div style=\"padding:40px;font-family:system-ui;max-width:520px;margin:40px auto;line-height:1.6\"><h2 style=\"margin:0 0 12px 0\">Cannot load application</h2><p>The frontend server (port 5500) is not running.</p><p><strong>Fix:</strong> From the project root, run:</p><pre style=\"background:#1e1e1e;color:#d4d4d4;padding:16px;border-radius:8px;overflow-x:auto\">.\\run_all.ps1</pre><p>This starts the backend (8001), frontend (5500), and bot.</p></div>'"></script>
  <script src="assets/js/scans.js"></script>
</body>
</html>
